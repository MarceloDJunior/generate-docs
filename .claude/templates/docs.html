<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{TITLE}} — Documentation</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; color: #1a1a2e; background: #fff; }

  .page { page-break-after: always; width: 210mm; min-height: calc(297mm - 28mm); position: relative; overflow: hidden; }
  .page:last-child { page-break-after: avoid; }

  /* Cover */
  .cover { background: #ffffff; display: flex; flex-direction: column; justify-content: center; padding: 60px 70px; border-left: 6px solid #2563eb; }
  .cover-tag { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: #2563eb; margin-bottom: 24px; }
  .cover-title { font-size: 48px; font-weight: 700; color: #2563eb; line-height: 1.15; margin-bottom: 60px; }
  .cover-divider { width: 60px; height: 3px; background: #2563eb; margin-bottom: 60px; }
  .cover-meta { font-size: 12px; color: #94a3b8; }
  .cover-meta strong { color: #64748b; }

  /* TOC */
  .toc-page { padding: 72px 70px; }
  .toc-heading { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #64748b; margin-bottom: 36px; border-bottom: 1px solid #e2e8f0; padding-bottom: 12px; }
  .toc-list { list-style: none; }
  .toc-list li { display: flex; align-items: baseline; gap: 8px; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
  .toc-list li:last-child { border-bottom: none; }
  .toc-num { font-size: 11px; font-weight: 700; color: #94a3b8; width: 24px; flex-shrink: 0; }
  .toc-label { font-size: 14px; font-weight: 600; color: #1a1a2e; flex: 1; }
  .toc-desc { font-size: 12px; color: #64748b; }

  /* Section pages */
  .section-page { padding: 72px 70px 56px; }
  .section-header { border-left: 3px solid #2563eb; padding-left: 16px; margin-bottom: 36px; }
  .section-num { font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px; }
  .section-title { font-size: 28px; font-weight: 700; color: #0f172a; }

  /* Content typography */
  .content h2 { font-size: 17px; font-weight: 700; color: #0f172a; margin: 28px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #e2e8f0; }
  .content h3 { font-size: 14px; font-weight: 700; color: #1e293b; margin: 20px 0 8px; }
  .content h4 { font-size: 13px; font-weight: 600; color: #334155; margin: 16px 0 6px; }
  .content p { line-height: 1.7; color: #334155; margin-bottom: 12px; }
  .content ul, .content ol { padding-left: 20px; margin-bottom: 12px; }
  .content li { line-height: 1.7; color: #334155; margin-bottom: 4px; }
  .content a { color: #2563eb; text-decoration: none; }
  .content strong { color: #1a1a2e; font-weight: 600; }
  .content code { font-family: 'Consolas', 'Fira Code', monospace; font-size: 12px; background: #f1f5f9; color: #be185d; padding: 1px 5px; border-radius: 3px; }
  .content pre { background: #0f172a; color: #e2e8f0; font-family: 'Consolas', 'Fira Code', monospace; font-size: 11.5px; line-height: 1.6; padding: 16px 18px; border-radius: 6px; overflow-x: auto; margin: 14px 0; }
  .content pre code { background: none; color: inherit; padding: 0; border-radius: 0; font-size: inherit; }
  .content blockquote { border-left: 3px solid #e2e8f0; padding-left: 14px; margin: 14px 0; color: #64748b; font-style: italic; }

  /* Tables */
  .content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 12px; }
  .content th { background: #f8fafc; color: #1e293b; text-align: left; padding: 9px 12px; font-weight: 600; font-size: 11px; letter-spacing: 0.5px; border-bottom: 2px solid #e2e8f0; }
  .content td { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; color: #334155; vertical-align: top; }
  .content tr:nth-child(even) td { background: #f8fafc; }

  /* Mermaid */
  .mermaid { margin: 20px 0; text-align: center; }
  .mermaid svg { max-width: 100%; height: auto; }

  @media print {
    @page { size: A4; margin: 14mm 0; }
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="page cover">
  <div class="cover-tag">Technical Documentation</div>
  <div class="cover-title">{{TITLE}}</div>
  <div class="cover-divider"></div>
  <div class="cover-meta">Generated on <strong>{{DATE}}</strong></div>
</div>

<div class="page toc-page">
  <div class="toc-heading">Table of Contents</div>
  <ul class="toc-list">
    {{TOC_ITEMS}}
  </ul>
</div>

{{SECTIONS}}

{{MD_SCRIPTS}}

<script>
  const renderer = new marked.Renderer();
  renderer.code = function(token, lang) {
    const code = typeof token === 'object' && token !== null ? (token.text || '') : token;
    const language = typeof token === 'object' && token !== null ? (token.lang || lang || '') : (lang || '');
    if (language === 'mermaid') {
      const safe = code.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      return '<div class="mermaid">' + safe + '</div>';
    }
    const escaped = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return '<pre><code>' + escaped + '</code></pre>';
  };
  marked.use({ renderer });

  for (let i = 1; i <= {{SECTION_COUNT}}; i++) {
    const md = document.getElementById('md' + i).textContent;
    document.getElementById('s' + i).innerHTML = marked.parse(md);
  }

  mermaid.initialize({ startOnLoad: false, theme: 'default' });
  mermaid.run().then(() => window.print());
</script>
</body>
</html>
